{% extends "base.html" %}
{% block content %}
<h2>Rate a Movie</h2>
<form method="POST">
Movie ID: <input type="number" name="movie_id" required><br>
Rating (0-5): <input type="number" name="rating" min="0" max="5" step="0.1" required><br>
<button type="submit">Submit Rating</button>
</form>
{% endblock %}
