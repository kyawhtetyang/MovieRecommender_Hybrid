<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rate · Movie Recommender v8</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="rate">
    <header class="site-header">
      <h1>Movie Recommender v8</h1>
      <nav>
        <a href="/index.html">Home</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/login.html">Login</a>
        <a href="/signup.html">Signup</a>
      </nav>
    </header>
    <main class="content">
      <h2>Rate a Movie</h2>
      <form id="rate-form">
        <label>
          Movie ID:
          <input type="number" name="movie_id" id="rate-movie-id" required />
        </label>
        <label>
          Rating (0-5):
          <input type="number" name="rating" id="rate-value" min="0" max="5" step="0.1" required />
        </label>
        <button type="submit">Submit Rating</button>
      </form>
      <div class="status" id="rate-status"></div>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
